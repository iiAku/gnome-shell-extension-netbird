name: Bug report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! If the extension showed an error notification, it should have copied diagnostic details to your clipboard automatically. Paste them in the error report field below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe what you were doing and what went wrong.
      placeholder: I clicked Connect and nothing happened...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: The extension should have connected to NetBird.
    validations:
      required: true

  - type: textarea
    id: error-report
    attributes:
      label: Error report (from clipboard)
      description: If the extension copied error details to your clipboard, paste them here. This includes version info, OS, and a stack trace.
      render: markdown
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Extension logs
      description: |
        If you have access to the logs, paste relevant lines here.
        Run: `journalctl --user -f -o cat | grep -iE 'netbird-status|gjs'`
      render: shell
    validations:
      required: false

  - type: input
    id: gnome-version
    attributes:
      label: GNOME Shell version
      description: "Run: `gnome-shell --version`"
      placeholder: "GNOME Shell 47.0"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Linux distribution
      description: "e.g., Fedora 41, Ubuntu 24.04, Arch"
      placeholder: "Fedora 41"
    validations:
      required: true

  - type: dropdown
    id: session
    attributes:
      label: Session type
      options:
        - Wayland
        - X11
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this hasn't been reported
          required: true
        - label: I verified `netbird status` works from a terminal without sudo
          required: true
